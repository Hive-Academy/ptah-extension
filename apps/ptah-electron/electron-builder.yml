appId: com.ptah.desktop
productName: Ptah
copyright: Copyright 2026 Ptah
electronVersion: 35.7.5

directories:
  output: ../../release
  buildResources: assets

files:
  - '**/*'
  - '!**/*.map'
  - '!**/*.ts'

# TASK_2025_261: Extract Codex native binaries from ASAR archive.
# The Codex SDK resolves platform-specific binaries via require.resolve(),
# but binaries inside app.asar cannot be spawned as executables.
# asarUnpack places them under app.asar.unpacked/ where they are executable.
asarUnpack:
  - 'node_modules/@openai/codex-win32-x64/**'
  - 'node_modules/@openai/codex-win32-arm64/**'
  - 'node_modules/@openai/codex-linux-x64/**'
  - 'node_modules/@openai/codex-linux-arm64/**'
  - 'node_modules/@openai/codex-darwin-x64/**'
  - 'node_modules/@openai/codex-darwin-arm64/**'

extraResources:
  - from: 'renderer'
    to: 'renderer'

icon: assets/icons/icon.png

mac:
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  target:
    - dmg
    - zip

win:
  target:
    - nsis

linux:
  category: Development
  target:
    - AppImage
    - deb

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

publish:
  provider: github
  owner: Hive-Academy
  repo: ptah-extension
