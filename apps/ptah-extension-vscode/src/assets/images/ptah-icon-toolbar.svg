  <line x1="8.5" y1="7.8" x2="9.8" y2="7.8" stroke="#C5C5C5" stroke-width="1" stroke-linecap="round"/>

  <!-- Uraeus -->
  <circle cx="8" cy="3.5" r="0.6" fill="#C5C5C5"/>

  <!-- Divine beard -->
