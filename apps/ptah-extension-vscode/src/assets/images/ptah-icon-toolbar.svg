  <path d="M8 1.5c2.2 0 4 1.5 4 3.5v1" stroke="#C5C5C5" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Headdress band -->
  <line x1="4" y1="5" x2="12" y2="5" stroke="#C5C5C5" stroke-width="0.8"/>

  <!-- Headdress side lappets -->
  <path d="M4 6v4.5c0 .5-.3.8-.7 1l-.8.5" stroke="#C5C5C5" stroke-width="1.1" stroke-linecap="round"/>
  <path d="M12 6v4.5c0 .5.3.8.7 1l.8.5" stroke="#C5C5C5" stroke-width="1.1" stroke-linecap="round"/>

  <!-- Face outline -->
  <path d="M5.5 6v2c0 1.7 1.1 3 2.5 3s2.5-1.3 2.5-3V6" stroke="#C5C5C5" stroke-width="1.1"/>

  <!-- Eyes -->
