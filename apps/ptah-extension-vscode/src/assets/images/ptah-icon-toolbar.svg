<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F2D06B"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#A07C30"/>
    </linearGradient>
    <linearGradient id="tGoldL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7E8A0"/>
      <stop offset="100%" stop-color="#D4A843"/>
    </linearGradient>
    <radialGradient id="tBlue" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#2A3F7A"/>
      <stop offset="100%" stop-color="#141E42"/>
    </radialGradient>
    <linearGradient id="tRim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8C84A"/>
      <stop offset="50%" stop-color="#C9A030"/>
      <stop offset="100%" stop-color="#E8C84A"/>
    </linearGradient>
  </defs>

  <!-- Outer gold rim -->
  <circle cx="8" cy="8" r="7.5" fill="url(#tRim)"/>

  <!-- Inner blue background -->
  <circle cx="8" cy="8" r="6.5" fill="url(#tBlue)"/>

  <!-- Ankh loop -->
  <ellipse cx="8" cy="4.8" rx="2.2" ry="2" fill="none" stroke="url(#tGold)" stroke-width="1.3"/>

  <!-- Ankh crossbar -->
  <rect x="4.5" y="6.4" width="7" height="1.2" rx="0.6" fill="url(#tGoldL)"/>

  <!-- Ankh vertical shaft -->
  <rect x="7.2" y="6.4" width="1.6" height="7" rx="0.4" fill="url(#tGold)"/>
  <!-- Shaft highlight -->
  <rect x="7.8" y="7" width="0.4" height="5.8" rx="0.2" fill="#F7E8A0" opacity="0.3"/>

  <!-- Code bracket left -->
  <path d="M3 4.5L2 6L3 7.5" stroke="#F2D06B" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

  <!-- Code bracket right -->
  <path d="M13 4.5L14 6L13 7.5" stroke="#F2D06B" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

  <!-- Gem on loop -->
  <circle cx="8" cy="3.2" r="0.5" fill="#8B3A62"/>
  <circle cx="8" cy="3.2" r="0.25" fill="#D4628A" opacity="0.7"/>

  <!-- Circuit nodes -->
  <circle cx="6" cy="9.5" r="0.35" fill="#C9A84C" opacity="0.6"/>
  <circle cx="10" cy="9.5" r="0.35" fill="#C9A84C" opacity="0.6"/>
  <line x1="6.3" y1="9.5" x2="7.2" y2="9.5" stroke="#C9A84C" stroke-width="0.35" opacity="0.5"/>
  <line x1="8.8" y1="9.5" x2="9.7" y2="9.5" stroke="#C9A84C" stroke-width="0.35" opacity="0.5"/>
</svg>
