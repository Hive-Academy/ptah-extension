<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Ptah - Egyptian God of Creation & Craftsmen -->

  <!-- Nemes headdress - top curve -->
  <path d="M12 2C9 2 6.5 4 6.5 7v1.5" stroke="#C5C5C5" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M12 2c3 0 5.5 2 5.5 5v1.5" stroke="#C5C5C5" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Headdress band -->
  <line x1="6.5" y1="7" x2="17.5" y2="7" stroke="#C5C5C5" stroke-width="1"/>

  <!-- Headdress side lappets -->
  <path d="M6.5 8.5v7c0 .8-.5 1.2-1 1.5l-1 .5" stroke="#C5C5C5" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M17.5 8.5v7c0 .8.5 1.2 1 1.5l1 .5" stroke="#C5C5C5" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Face outline -->
  <path d="M8 8.5v3c0 2.5 1.8 4.5 4 4.5s4-2 4-4.5v-3" stroke="#C5C5C5" stroke-width="1.3" stroke-linejoin="round"/>

  <!-- Eyes - Egyptian almond style -->
  <path d="M9 11.2c.3-.3.8-.5 1.2-.5.4 0 .8.2 1.1.5" stroke="#C5C5C5" stroke-width="1" stroke-linecap="round"/>
  <path d="M12.7 11.2c.3-.3.8-.5 1.2-.5.4 0 .8.2 1.1.5" stroke="#C5C5C5" stroke-width="1" stroke-linecap="round"/>

  <!-- Uraeus (cobra jewel on forehead) -->
  <circle cx="12" cy="5" r="0.8" fill="#C5C5C5"/>

  <!-- Divine beard (straight, ceremonial) -->
  <path d="M12 16v5.5" stroke="#C5C5C5" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Beard straps -->
  <path d="M10.5 13.5L12 16" stroke="#C5C5C5" stroke-width="0.7" stroke-linecap="round"/>
  <path d="M13.5 13.5L12 16" stroke="#C5C5C5" stroke-width="0.7" stroke-linecap="round"/>
</svg>
