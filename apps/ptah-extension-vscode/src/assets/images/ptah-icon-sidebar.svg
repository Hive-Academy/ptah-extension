<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Ptah Ankh with code brackets - Sidebar icon -->

  <!-- Ankh loop (top circle) -->
  <path d="M12 3C9.8 3 8 4.6 8 6.5C8 8.4 9.8 10 12 10C14.2 10 16 8.4 16 6.5C16 4.6 14.2 3 12 3Z" stroke="#C5C5C5" stroke-width="1.5" fill="none"/>

  <!-- Ankh crossbar -->
  <line x1="7.5" y1="10" x2="16.5" y2="10" stroke="#C5C5C5" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Ankh vertical shaft -->
  <line x1="12" y1="10" x2="12" y2="21" stroke="#C5C5C5" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Code bracket left -->
  <path d="M5 7L3 9.5L5 12" stroke="#C5C5C5" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Code bracket right -->
  <path d="M19 7L21 9.5L19 12" stroke="#C5C5C5" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small circuit nodes on shaft -->
  <circle cx="12" cy="14" r="1" fill="#C5C5C5"/>
  <circle cx="12" cy="18" r="1" fill="#C5C5C5"/>

  <!-- Horizontal circuit lines from nodes -->
  <line x1="10" y1="14" x2="12" y2="14" stroke="#C5C5C5" stroke-width="0.8"/>
  <line x1="12" y1="14" x2="14" y2="14" stroke="#C5C5C5" stroke-width="0.8"/>
  <line x1="10" y1="18" x2="12" y2="18" stroke="#C5C5C5" stroke-width="0.8"/>
  <line x1="12" y1="18" x2="14" y2="18" stroke="#C5C5C5" stroke-width="0.8"/>
</svg>
