<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F2D06B"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#A07C30"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7E8A0"/>
      <stop offset="100%" stop-color="#D4A843"/>
    </linearGradient>
    <radialGradient id="blueBg" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#2A3F7A"/>
      <stop offset="100%" stop-color="#141E42"/>
    </radialGradient>
    <linearGradient id="rimGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8C84A"/>
      <stop offset="30%" stop-color="#C9A030"/>
      <stop offset="70%" stop-color="#E8C84A"/>
      <stop offset="100%" stop-color="#A08030"/>
    </linearGradient>
  </defs>

  <!-- Outer gold rim -->
  <circle cx="12" cy="12" r="11.5" fill="url(#rimGrad)"/>

  <!-- Inner blue background -->
  <circle cx="12" cy="12" r="10" fill="url(#blueBg)"/>

  <!-- Subtle inner ring -->
  <circle cx="12" cy="12" r="10" fill="none" stroke="#C9A84C" stroke-width="0.3" opacity="0.5"/>

  <!-- Ankh loop -->
  <ellipse cx="12" cy="6.8" rx="3" ry="2.8" fill="none" stroke="url(#goldGrad)" stroke-width="1.6"/>
  <!-- Inner highlight on loop -->
  <ellipse cx="12" cy="6.5" rx="1.8" ry="1.5" fill="none" stroke="#F7E8A0" stroke-width="0.3" opacity="0.5"/>

  <!-- Ankh crossbar -->
  <rect x="6.5" y="9.2" width="11" height="1.6" rx="0.8" fill="url(#goldLight)"/>

  <!-- Ankh vertical shaft -->
  <rect x="11" y="9.2" width="2" height="10" rx="0.5" fill="url(#goldGrad)"/>
  <!-- Shaft center highlight -->
  <rect x="11.7" y="10" width="0.6" height="8.5" rx="0.3" fill="#F7E8A0" opacity="0.35"/>

  <!-- Code bracket left [ -->
  <path d="M4.5 6.5L3 8.5L4.5 10.5" stroke="#F2D06B" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <!-- Code bracket right ] -->
  <path d="M19.5 6.5L21 8.5L19.5 10.5" stroke="#F2D06B" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <!-- Circuit lines from crossbar -->
  <line x1="6.5" y1="10" x2="4.5" y2="11.5" stroke="#C9A84C" stroke-width="0.5" opacity="0.6"/>
  <line x1="17.5" y1="10" x2="19.5" y2="11.5" stroke="#C9A84C" stroke-width="0.5" opacity="0.6"/>

  <!-- Circuit node dots -->
  <circle cx="4.2" cy="11.8" r="0.7" fill="#C9A84C" opacity="0.7"/>
  <circle cx="19.8" cy="11.8" r="0.7" fill="#C9A84C" opacity="0.7"/>

  <!-- Small circuit traces on shaft -->
  <line x1="9.5" y1="14" x2="11" y2="14" stroke="#C9A84C" stroke-width="0.4" opacity="0.5"/>
  <line x1="13" y1="14" x2="14.5" y2="14" stroke="#C9A84C" stroke-width="0.4" opacity="0.5"/>
  <line x1="9.5" y1="16.5" x2="11" y2="16.5" stroke="#C9A84C" stroke-width="0.4" opacity="0.5"/>
  <line x1="13" y1="16.5" x2="14.5" y2="16.5" stroke="#C9A84C" stroke-width="0.4" opacity="0.5"/>
  <circle cx="9.2" cy="14" r="0.4" fill="#D4A843" opacity="0.6"/>
  <circle cx="14.8" cy="14" r="0.4" fill="#D4A843" opacity="0.6"/>
  <circle cx="9.2" cy="16.5" r="0.4" fill="#D4A843" opacity="0.6"/>
  <circle cx="14.8" cy="16.5" r="0.4" fill="#D4A843" opacity="0.6"/>

  <!-- Gem on ankh loop top -->
  <circle cx="12" cy="4.5" r="0.8" fill="#8B3A62" opacity="0.9"/>
  <circle cx="12" cy="4.5" r="0.4" fill="#D4628A" opacity="0.7"/>

  <!-- Subtle star sparkle accents -->
  <circle cx="7" cy="5" r="0.3" fill="#F7E8A0" opacity="0.6"/>
  <circle cx="17" cy="5" r="0.3" fill="#F7E8A0" opacity="0.6"/>
</svg>
