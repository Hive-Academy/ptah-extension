# =============================================================================
# Ptah Extension - Database-Only Docker Compose
# =============================================================================
#
# This compose file runs ONLY the databases (PostgreSQL + Redis).
# Use this for local development when you want to run the backend server
# outside of Docker (for faster hot-reload, debugging, etc.)
#
# USAGE:
#   # Start databases only
#   docker-compose -f docker-compose.db.yml up -d
#
#   # Stop databases
#   docker-compose -f docker-compose.db.yml down
#
#   # Stop and remove data volumes
#   docker-compose -f docker-compose.db.yml down -v
#
# THEN run your application locally:
#   cd apps/ptah-license-server
#   npx prisma migrate dev  # Create/apply migrations
#   npx nx serve ptah-license-server
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 - Primary Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: ptah_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ptah_licenses}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ptah_licenses}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - ptah-network

  # ---------------------------------------------------------------------------
  # Redis 7 - Cache and Session Store
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ptah_redis_dev
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - '${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - ptah-network

# =============================================================================
# Named Volumes
# =============================================================================
volumes:
  postgres-data:
    name: ptah_postgres_dev_data
  redis-data:
    name: ptah_redis_dev_data

# =============================================================================
# Networks
# =============================================================================
networks:
  ptah-network:
    name: ptah_dev_network
    driver: bridge
