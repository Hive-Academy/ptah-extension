# =============================================================================
# DigitalOcean App Platform Specification
# =============================================================================
#
# This file defines the static site hosting on App Platform.
#
# ARCHITECTURE:
#   - Static Site: ptah-landing-page (Angular) -> ptah.live (App Platform, free)
#   - API Server: ptah-license-server (NestJS) -> api.ptah.live (DO Droplet)
#   - Database: Self-hosted PostgreSQL 16 (DO Droplet)
#
# The API and database run on a $6/month Droplet via docker-compose.prod.yml.
# Only the landing page uses App Platform (free static site hosting).
#
# DEPLOYMENT:
#   doctl apps create --spec .do/app.yaml
#
# UPDATE:
#   doctl apps update <APP_ID> --spec .do/app.yaml
#
# =============================================================================

name: starfish-app
region: fra

ingress:
  rules:
  - component:
      name: landing
    match:
      authority:
        exact: ""
      path:
        prefix: /

alerts:
- rule: DEPLOYMENT_FAILED
- rule: DOMAIN_FAILED

# =============================================================================
# Static Site: Landing Page (Angular)
# =============================================================================
static_sites:
  - name: landing
    github:
      repo: Hive-Academy/ptah-extension
      branch: main
      deploy_on_push: false
    source_dir: /
    build_command: bash scripts/do-build.sh
    output_dir: dist/ptah-landing-page/browser
    environment_slug: node-js
    envs:
      - key: NODE_ENV
        scope: BUILD_TIME
        value: production
      - key: NX_CACHE_DIRECTORY
        scope: BUILD_TIME
        value: /tmp/.nx-cache
