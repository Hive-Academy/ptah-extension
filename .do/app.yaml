# =============================================================================
# DigitalOcean App Platform Specification
# =============================================================================
#
# This file defines the static site hosting on App Platform.
#
# ARCHITECTURE:
#   - Static Site: ptah-landing-page (Angular) -> ptah.live (App Platform, free)
#   - API Server: ptah-license-server (NestJS) -> api.ptah.live (DO Droplet)
#   - Database: Self-hosted PostgreSQL 16 (DO Droplet)
#
# The API and database run on a $6/month Droplet via docker-compose.prod.yml.
# Only the landing page uses App Platform (free static site hosting).
#
# DEPLOYMENT:
#   doctl apps create --spec .do/app.yaml
#
# UPDATE:
#   doctl apps update <APP_ID> --spec .do/app.yaml
#
# COST: ~$6/month (Droplet $6 + Domain ~$12/year)
#
# =============================================================================

name: ptah-production
region: nyc

# =============================================================================
# Static Site: Landing Page (Angular)
# =============================================================================
# Free tier - no additional cost
# Serves the marketing website at ptah.live
#
static_sites:
  - name: landing
    github:
      repo: Hive-Academy/ptah-extension # TODO: Verify this matches your GitHub repo
      branch: release/landing
      deploy_on_push: false
    source_dir: /
    build_command: npm ci && npx nx build ptah-landing-page --configuration=production
    output_dir: dist/ptah-landing-page/browser
    catchall_document: index.html # SPA routing support
    routes:
      - path: /
    envs:
      - key: NODE_ENV
        scope: BUILD_TIME
        value: production
# =============================================================================
# Domains
# =============================================================================
# Configure after initial deployment via DO console or CLI
#
# domains:
#   - domain: ptah.live
#     type: PRIMARY
#     zone: ptah.live
#   - domain: www.ptah.live
#     type: ALIAS
