# =============================================================================
# Ptah Extension - Production Docker Compose (DigitalOcean Droplet)
# =============================================================================
#
# Production stack: PostgreSQL + License Server + nginx (SSL) + Certbot
#
# INITIAL SETUP:
#   1. Copy .env.prod.example to .env.prod and fill in secrets
#   2. Run: docker compose -f docker-compose.prod.yml up -d
#   3. Issue SSL cert: docker compose -f docker-compose.prod.yml run --rm certbot
#      certonly --webroot -w /var/www/certbot -d api.ptah.live
#   4. Restart nginx: docker compose -f docker-compose.prod.yml restart nginx
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 - Production Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: ptah_postgres_prod
    restart: always
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - ptah-network

  # ---------------------------------------------------------------------------
  # License Server - NestJS Application (Production)
  # ---------------------------------------------------------------------------
  license-server:
    build:
      context: .
      dockerfile: apps/ptah-license-server/Dockerfile
    container_name: ptah_license_server_prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NODE_ENV: production
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - ptah-network

  # ---------------------------------------------------------------------------
  # nginx - Reverse Proxy with SSL
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: ptah_nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/www/certbot:ro
    depends_on:
      - license-server
    networks:
      - ptah-network

  # ---------------------------------------------------------------------------
  # Certbot - SSL Certificate Auto-Renewal
  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot
    container_name: ptah_certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    networks:
      - ptah-network

# =============================================================================
# Named Volumes
# =============================================================================
volumes:
  postgres-data:
    name: ptah_postgres_prod_data
  certbot-etc:
    name: ptah_certbot_etc
  certbot-var:
    name: ptah_certbot_var

# =============================================================================
# Networks
# =============================================================================
networks:
  ptah-network:
    name: ptah_prod_network
    driver: bridge
