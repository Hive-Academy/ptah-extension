<div class="provider-card" [class.current]="isCurrent()">
  <!-- Provider Info -->
  <div class="provider-content">
    <div class="provider-main">
      <h3 class="provider-name">{{ provider().name }}</h3>
      <p class="provider-description">{{ provider().description }}</p>
    </div>

    <!-- Health Status Badge -->
    <span class="health-badge" [class]="healthStatus().class">
      {{ healthStatus().label }}
    </span>
  </div>

  <!-- Actions -->
  @if (!isCurrent()) {
  <div class="provider-actions">
    <button class="btn-switch" (click)="onSwitch()" type="button">
      Switch To
    </button>
  </div>
  }
</div>
