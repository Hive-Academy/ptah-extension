<section aria-label="Thoth status">
  <header class="flex items-center justify-between mb-2">
    <div class="flex items-center gap-2">
      <lucide-angular
        [img]="RadioTowerIcon"
        class="w-4 h-4 text-primary"
        aria-hidden="true"
      ></lucide-angular>
      <h3 class="text-base font-bold">Thoth</h3>
    </div>
    @if (isLoading()) {
      <span class="loading loading-spinner loading-xs" aria-label="Refreshing"></span>
    }
  </header>

  <div class="grid grid-cols-2 xl:grid-cols-4 gap-3" role="list">
    @for (tile of tiles(); track tile.id) {
      <button
        type="button"
        role="listitem"
        class="stats stats-vertical bg-base-200/40 border border-base-content/10 shadow-sm text-left transition-colors hover:border-primary/50 hover:bg-base-200/70 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary"
        [class.opacity-60]="!tile.available"
        (click)="openTab(tile.id)"
        (keydown)="onRowKeydown($event, tile.id)"
        [attr.aria-label]="'Open ' + tile.label + ' tab'"
      >
        <div class="stat p-4">
          <div class="stat-figure" [class]="tile.accent">
            <lucide-angular
              [img]="tile.icon"
              class="w-7 h-7"
              aria-hidden="true"
            ></lucide-angular>
          </div>

          <div class="stat-title flex items-center gap-1 text-base-content/60">
            {{ tile.label }}
            <lucide-angular
              [img]="ChevronRightIcon"
              class="w-3 h-3 opacity-50"
              aria-hidden="true"
            ></lucide-angular>
          </div>

          <div class="stat-value text-3xl flex items-baseline gap-1.5" [class]="tile.accent">
            {{ tile.value }}
            @if (tile.unit) {
              <span class="text-xs font-medium text-base-content/40">{{ tile.unit }}</span>
            }
          </div>

          <div class="stat-desc text-base-content/60 truncate mt-1">
            {{ tile.desc }}
          </div>

          @if (tile.id === 'gateway' && tile.platforms.length > 0) {
            <div class="stat-desc mt-2 flex flex-wrap items-center gap-1">
              @for (platform of tile.platforms; track platform.platform) {
                <span
                  [class]="badgeClassFor(platform.state)"
                  [attr.title]="platform.lastError ?? platform.state"
                >
                  {{ platform.platform }}
                </span>
              }
            </div>
          }

          @if (tile.error) {
            <div class="stat-desc text-error truncate mt-1" role="alert">
              {{ tile.error }}
            </div>
          }
        </div>
      </button>
    }
  </div>
</section>
