<!--
  SettingsComponent - Compact VS Code Sidebar Design
  
  Follows VS Code UX Guidelines:
  - Icons: 16-20px (was 24px+)
  - Headings: 14-16px (text-sm)
  - Padding: 12-16px (px-3, py-3)
  - Compact spacing: space-y-3, gap-2
-->

<div class="h-full overflow-y-auto bg-base-100">
  <div class="px-3 py-3 space-y-3">
    <!-- Compact Header with back button -->
    <div class="flex items-center gap-2">
      <button
        class="btn btn-ghost btn-xs gap-1.5"
        (click)="backToChat()"
        aria-label="Back to Chat"
      >
        <lucide-angular [img]="ArrowLeftIcon" class="w-3.5 h-3.5" />
        <span class="text-xs">Back</span>
      </button>
      <h1 class="text-sm font-semibold">Settings</h1>
    </div>

    <!-- Authentication Section - Compact Card -->
    <div class="border border-base-300 rounded-md bg-base-200/50">
      <div class="p-3">
        <div class="flex items-center gap-1.5 mb-2">
          <span class="text-sm">🔐</span>
          <h2 class="text-xs font-medium uppercase tracking-wide">
            Authentication
          </h2>
        </div>
        <p class="text-xs text-base-content/70 mb-3">
          Configure your authentication method to connect with Claude Code.
        </p>
        <ptah-auth-config />
      </div>
    </div>

    <!-- Future sections placeholder comments for expansion -->
    <!-- Model Selection Section - TODO: Add ModelSelectorComponent -->
    <!-- Autopilot Configuration Section - TODO: Add AutopilotConfigComponent -->
  </div>
</div>
