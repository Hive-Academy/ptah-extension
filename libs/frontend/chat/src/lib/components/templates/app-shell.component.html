<!-- Global confirmation dialog (replaces window.confirm) -->
<ptah-confirmation-dialog />

<!--
  Layout Architecture:
  - Wizard and Settings views render STANDALONE (no sidebar, no tabs)
  - Chat view renders with full sidebar + tab bar layout
  - View determined by appStateManager.currentView() signal
-->

@switch (currentView()) {
<!-- Setup Wizard: Full-width, standalone layout -->
@case ('setup-wizard') {
<div class="h-full w-full">
  <ptah-wizard-view />
</div>
}

<!-- Settings: Full-width, standalone layout -->
@case ('settings') {
<div class="h-full w-full">
  <ptah-settings />
</div>
}

<!-- Chat (default): Sidebar + Header + Chat layout -->
@default {
<div class="flex h-full">
  <!-- Session Sidebar (always visible, fixed width) -->
  <aside
    class="flex flex-col bg-base-200 border-r border-base-300"
    [class.w-0]="!sidebarOpen()"
    [class.w-52]="sidebarOpen()"
    [class.overflow-hidden]="!sidebarOpen()"
  >
    <!-- Sidebar header with Ptah icon and new session button -->
    <div class="p-2 border-b border-base-300 flex items-center justify-between">
      <!-- Ptah icon -->
      <img
        [ngSrc]="ptahIconUri"
        alt="Ptah"
        class="w-6 h-6 flex-shrink-0"
        width="24"
        height="24"
      />

      <!-- New session popover -->
      <ptah-native-popover
        [isOpen]="sessionNamePopoverOpen()"
        [placement]="'bottom'"
        [hasBackdrop]="true"
        [backdropClass]="'transparent'"
        (closed)="handleCancelSession()"
      >
        <!-- Trigger: New Session button -->
        <button
          trigger
          class="btn btn-primary btn-sm btn-square flex-shrink-0"
          (click)="createNewSession()"
          aria-label="New Session"
          title="New Session"
        >
          <lucide-angular [img]="PlusIcon" class="w-3.5 h-3.5" />
        </button>

        <!-- Popover content -->
        <div content class="p-4 w-80">
          <h3 class="text-sm font-semibold mb-3">New Session</h3>

          <!-- Input field with Enter/ESC keyboard support -->
          <input
            #sessionNameInputRef
            type="text"
            class="input input-bordered input-sm w-full mb-3"
            placeholder="Enter session name (optional)"
            [(ngModel)]="sessionNameInput"
            (keydown.enter)="handleCreateSession()"
            (keydown.escape)="handleCancelSession()"
          />

          <!-- Action buttons -->
          <div class="flex gap-2">
            <button
              class="btn btn-sm btn-ghost flex-1 gap-1.5"
              (click)="handleCancelSession()"
            >
              <lucide-angular [img]="XIcon" class="w-3 h-3" />
              Cancel
            </button>
            <button
              class="btn btn-sm btn-primary flex-1 gap-1.5"
              (click)="handleCreateSession()"
            >
              <lucide-angular [img]="CheckIcon" class="w-3 h-3" />
              Create
            </button>
          </div>
        </div>
      </ptah-native-popover>
    </div>

    <!-- Session list (scrollable) -->
    <div class="flex-1 overflow-y-auto p-1">
      <ul class="menu menu-sm p-0 gap-0.5">
        @for (session of chatStore.sessions(); track session.id) {
        <li class="group relative">
          <button
            type="button"
            class="flex flex-col items-start gap-0.5 py-1.5 px-2 pr-7 w-full text-left rounded-lg border border-transparent"
            [class.active]="session.id === chatStore.currentSession()?.id"
            [class.bg-primary]="session.id === chatStore.currentSession()?.id"
            [class.text-primary-content]="
              session.id === chatStore.currentSession()?.id
            "
            [class.border-primary!]="isSessionOpen(session.id)"
            [class.text-primary]="
              isSessionOpen(session.id) &&
              session.id !== chatStore.currentSession()?.id
            "
            (click)="chatStore.switchSession(session.id)"
          >
            <!-- Session title -->
            <span
              class="font-medium text-xs truncate w-full leading-tight"
              [title]="session.name"
            >
              {{ getSessionDisplayName(session) }}
            </span>
            <!-- Session metadata -->
            <span
              class="text-[10px] opacity-60 flex items-center gap-1.5 w-full"
            >
              <span>{{ session.lastActivityAt | date : 'M/d HH:mm' }}</span>
              @if (session.messageCount > 0) {
              <span class="badge badge-xs badge-ghost px-1">
                {{ session.messageCount }} msgs
              </span>
              }
            </span>
          </button>
          <!-- Delete button (appears on hover) -->
          <button
            type="button"
            class="absolute right-1 top-1/2 -translate-y-1/2 btn btn-ghost btn-xs btn-square opacity-0 group-hover:opacity-100 transition-opacity hover:text-error"
            title="Delete session"
            aria-label="Delete session"
            (click)="deleteSession($event, session)"
          >
            <lucide-angular [img]="Trash2Icon" class="w-3 h-3" />
          </button>
        </li>
        } @empty {
        <li class="p-3 text-center text-xs text-base-content/50">
          No sessions yet
        </li>
        }
      </ul>

      <!-- Load More button -->
      @if (chatStore.hasMoreSessions()) {
      <div class="p-2 pt-1">
        <button
          class="btn btn-ghost btn-xs w-full"
          [class.loading]="chatStore.isLoadingMoreSessions()"
          [disabled]="chatStore.isLoadingMoreSessions()"
          (click)="chatStore.loadMoreSessions()"
        >
          @if (chatStore.isLoadingMoreSessions()) {
          <span class="loading loading-spinner loading-xs"></span>
          Loading... } @else {
          <lucide-angular [img]="ChevronDownIcon" class="w-3 h-3" />
          Load More ({{
            chatStore.totalSessions() - chatStore.sessions().length
          }}
          more) }
        </button>
      </div>
      }
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col min-w-0">
    <!-- Header -->
    <div
      class="navbar bg-base-100 border-b border-base-300 min-h-[40px] px-2 gap-2"
    >
      <!-- Sidebar toggle -->
      <button
        class="btn btn-square btn-ghost btn-sm"
        aria-label="Toggle sidebar"
        (click)="toggleSidebar()"
      >
        <lucide-angular
          [img]="sidebarOpen() ? PanelLeftCloseIcon : PanelLeftOpenIcon"
          class="w-4 h-4"
        />
      </button>

      <!-- Tab bar (relocated from below) -->
      <div class="flex-1 min-w-0">
        <ptah-tab-bar />
      </div>

      <!-- Header actions -->
      <div class="flex gap-1">
        <!-- Theme toggle -->
        <ptah-theme-toggle />

        <button
          class="btn btn-square btn-ghost btn-sm"
          aria-label="Settings"
          (click)="openSettings()"
        >
          <lucide-angular [img]="SettingsIcon" class="w-4 h-4" />
        </button>
      </div>
    </div>

    <!-- Chat content area -->
    <div class="flex-1 overflow-hidden">
      <ptah-chat-view />
    </div>
  </div>
</div>
} }
