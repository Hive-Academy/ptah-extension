<div class="drawer lg:drawer-open">
  <!-- Hidden checkbox for mobile drawer toggle -->
  <input id="session-drawer" type="checkbox" class="drawer-toggle" />

  <!-- Main Content -->
  <div class="drawer-content flex flex-col">
    <!-- Header -->
    <div class="navbar bg-base-100 border-b border-base-300 min-h-[48px]">
      <!-- Mobile hamburger -->
      <label
        for="session-drawer"
        class="btn btn-square btn-ghost lg:hidden"
        aria-label="Open menu"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-5 h-5"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <line x1="4" x2="20" y1="12" y2="12" />
          <line x1="4" x2="20" y1="6" y2="6" />
          <line x1="4" x2="20" y1="18" y2="18" />
        </svg>
      </label>

      <!-- Title -->
      <div class="flex-1">
        <span class="text-xl font-bold">Ptah</span>
      </div>

      <!-- Header actions (optional) -->
      <div class="flex gap-2">
        <button class="btn btn-square btn-ghost btn-sm" aria-label="Settings">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-5 h-5"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"
            />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Chat View -->
    <ptah-chat-view class="flex-1 overflow-hidden" />
  </div>

  <!-- Session Sidebar -->
  <div class="drawer-side z-40">
    <label
      for="session-drawer"
      class="drawer-overlay"
      aria-label="Close menu"
    ></label>

    <aside class="menu bg-base-200 w-80 min-h-full p-4">
      <!-- Sidebar header -->
      <div class="mb-4">
        <h2 class="text-lg font-bold mb-2">Sessions</h2>
        <button class="btn btn-primary btn-sm w-full gap-2">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-4 h-4"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M5 12h14" />
            <path d="M12 5v14" />
          </svg>
          New Session
        </button>
      </div>

      <!-- Session list -->
      <ul class="space-y-1">
        @for (session of chatStore.sessions(); track session.id) {
        <li>
          <a
            class="flex items-center justify-between gap-2 py-3 px-4 hover:bg-base-300 rounded-md transition-colors"
            [class.active]="session.id === chatStore.currentSession()?.id"
            (click)="chatStore.switchSession(session.id)"
          >
            <div class="flex-1 min-w-0">
              <div class="font-medium text-sm truncate">{{ session.name }}</div>
              <div class="text-xs text-base-content/60">
                {{ session.lastActivityAt | date : 'short' }}
              </div>
            </div>
            <span class="badge badge-sm badge-ghost">{{
              session.messageCount
            }}</span>
          </a>
        </li>
        }
      </ul>
    </aside>
  </div>
</div>
