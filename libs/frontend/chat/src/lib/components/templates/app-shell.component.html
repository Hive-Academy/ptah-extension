<div class="drawer lg:drawer-open h-full">
  <!-- Hidden checkbox for mobile drawer toggle -->
  <input id="session-drawer" type="checkbox" class="drawer-toggle" />

  <!-- Main Content -->
  <div class="drawer-content flex flex-col h-full">
    <!-- Header -->
    <div class="navbar bg-base-100 border-b border-base-300 min-h-[48px]">
      <!-- Mobile hamburger -->
      <label
        for="session-drawer"
        class="btn btn-square btn-ghost lg:hidden"
        aria-label="Open menu"
      >
        <lucide-angular [img]="MenuIcon" class="w-5 h-5" />
      </label>

      <!-- Title -->
      <div class="flex-1">
        <span class="text-xl font-bold">Ptah</span>
      </div>

      <!-- Header actions (optional) -->
      <div class="flex gap-2">
        <button class="btn btn-square btn-ghost btn-sm" aria-label="Settings">
          <lucide-angular [img]="SettingsIcon" class="w-5 h-5" />
        </button>
      </div>
    </div>

    <!-- Chat View -->
    <ptah-chat-view class="flex-1 overflow-hidden" />
  </div>

  <!-- Session Sidebar -->
  <div class="drawer-side z-40">
    <label
      for="session-drawer"
      class="drawer-overlay"
      aria-label="Close menu"
    ></label>

    <aside class="menu bg-base-200 w-56 max-w-[224px] min-h-full p-3">
      <!-- Sidebar header -->
      <div class="mb-3">
        <h2 class="text-base font-bold mb-2">Sessions</h2>
        <button class="btn btn-primary btn-xs w-full gap-1">
          <lucide-angular [img]="PlusIcon" class="w-3 h-3" />
          New Session
        </button>
      </div>

      <!-- Session list -->
      <ul class="space-y-1">
        @for (session of chatStore.sessions(); track session.id) {
        <li>
          <a
            class="flex items-center gap-2 py-2 px-2 hover:bg-base-300 rounded-md transition-colors cursor-pointer"
            [class.active]="session.id === chatStore.currentSession()?.id"
            (click)="chatStore.switchSession(session.id)"
          >
            <div class="flex-1 min-w-0 overflow-hidden">
              <div
                class="font-medium text-xs truncate max-w-full"
                [title]="session.name"
              >
                {{ session.name }}
              </div>
              <div class="text-[10px] text-base-content/60 flex items-center gap-1">
                <span>{{ session.lastActivityAt | date : 'M/d' }}</span>
                <span class="badge badge-xs badge-ghost">{{
                  session.messageCount
                }}</span>
              </div>
            </div>
          </a>
        </li>
        }
      </ul>
    </aside>
  </div>
</div>
