<button
  role="button"
  class="agent-status-badge"
  [class.active]="badgeState() === 'active'"
  [class.error]="badgeState() === 'error'"
  [attr.aria-label]="ariaLabel()"
  (click)="onClick()"
  (mouseenter)="onMouseEnter()"
  (mouseleave)="onMouseLeave()"
>
  <!-- Badge Icon + Text -->
  <span class="badge-icon">🤖</span>
  <span class="badge-text">
    @if (agentCount() === 0) {
      No agents
    } @else if (agentCount() === 1) {
      1 agent
    } @else {
      {{ agentCount() }} agents
    }
  </span>

  <!-- Error Indicator (top-right overlay) -->
  @if (hasErrors()) {
    <span class="error-indicator" aria-label="Error">!</span>
  }

  <!-- Hover Tooltip -->
  @if (showTooltip()) {
    <div class="badge-tooltip" role="tooltip">
      <div class="tooltip-header">Active Agents:</div>
      <ul class="tooltip-list">
        @for (agent of activeAgents(); track agent.agent.agentId) {
          <li class="tooltip-item">
            <span class="tooltip-agent">{{ agent.agent.subagentType }}</span>
            <span class="tooltip-duration">
              @if (agent.duration) {
                ({{ formatDuration(agent.duration) }})
              } @else {
                ({{ getRunningDuration(agent.agent.timestamp) }})
              }
              @if (agent.status === 'error') {
                <span class="tooltip-error"> (error)</span>
              }
            </span>
          </li>
        }
      </ul>
    </div>
  }
</button>

<!-- Helper methods exposed for template -->
@if (false) {
  {{ formatDuration(0) }}
  {{ getRunningDuration(0) }}
}
