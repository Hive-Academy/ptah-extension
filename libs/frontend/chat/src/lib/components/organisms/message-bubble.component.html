@if (message().role === 'assistant') {
<!-- Assistant message (left-aligned) -->
<div class="chat chat-start">
  <!-- Avatar -->
  <div class="chat-image avatar">
    <div
      class="w-8 h-8 rounded-full bg-accent flex items-center justify-center"
    >
      <span class="text-white text-xs font-semibold">AI</span>
    </div>
  </div>

  <!-- Header -->
  <div class="chat-header text-xs text-base-content/70 mb-1">
    Claude
    <time
      class="ml-2 opacity-60"
      [attr.datetime]="formatDateTime(message().timestamp)"
    >
      {{ formatTime(message().timestamp) }}
    </time>
  </div>

  <!-- Message bubble -->
  <div
    class="chat-bubble bg-neutral text-neutral-content shadow-card max-w-[85%] md:max-w-[90%] lg:max-w-[85%]"
  >
    @if (message().executionTree) {
    <!-- ExecutionNode recursive tree -->
    <ptah-execution-node [node]="message().executionTree!" />
    } @else {
    <!-- Fallback text content -->
    <markdown
      [data]="message().rawContent || ''"
      class="prose prose-sm prose-invert max-w-none"
    />
    }
  </div>

  <!-- Action buttons (hover reveal) -->
  <div
    class="chat-footer opacity-0 hover:opacity-100 transition-opacity duration-200 flex gap-1 mt-1"
  >
    <button class="btn btn-xs btn-ghost" aria-label="Copy message" title="Copy">
      <lucide-angular [img]="CopyIcon" class="w-3.5 h-3.5" />
    </button>
    <button class="btn btn-xs btn-ghost" aria-label="Like message" title="Like">
      <lucide-angular [img]="ThumbsUpIcon" class="w-3.5 h-3.5" />
    </button>
    <button
      class="btn btn-xs btn-ghost"
      aria-label="Dislike message"
      title="Dislike"
    >
      <lucide-angular [img]="ThumbsDownIcon" class="w-3.5 h-3.5" />
    </button>
  </div>
</div>
} @else {
<!-- User message (right-aligned) -->
<div class="chat chat-end">
  <!-- Avatar -->
  <div class="chat-image avatar">
    <div
      class="w-8 h-8 rounded-full bg-primary flex items-center justify-center"
    >
      <span class="text-white text-xs font-semibold">U</span>
    </div>
  </div>

  <!-- Header -->
  <div class="chat-header text-xs text-base-content/70 mb-1">
    <time
      class="mr-2 opacity-60"
      [attr.datetime]="formatDateTime(message().timestamp)"
    >
      {{ formatTime(message().timestamp) }}
    </time>
    You
  </div>

  <!-- Message bubble -->
  <div
    class="chat-bubble chat-bubble-primary bg-primary text-primary-content shadow-card max-w-[85%] md:max-w-[90%] lg:max-w-[85%]"
  >
    <markdown
      [data]="message().rawContent || ''"
      class="prose prose-sm prose-invert max-w-none"
    />
  </div>
</div>
}
