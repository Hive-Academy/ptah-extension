# =============================================================================
# Ptah Extension - Docker Compose Development Environment
# =============================================================================
#
# This Docker Compose configuration provides a complete local development
# environment for the Ptah License Server, including:
#   - PostgreSQL 16 (database)
#   - Redis 7 (caching and session storage)
#   - License Server (NestJS application)
#
# QUICK START:
#   1. Copy .env.docker.example to .env.docker (at project root)
#   2. Copy apps/ptah-license-server/.env.example to apps/ptah-license-server/.env
#   3. Run: docker-compose up -d
#   4. Wait for health checks to pass
#   5. Access API at http://localhost:3000/api
#
# WINDOWS USERS:
#   For optimal performance, run Docker with WSL2 backend and store the
#   project files inside WSL2 filesystem (e.g., /home/user/projects/).
#   Windows filesystem (C:\, D:\) has significant I/O performance overhead.
#
# TROUBLESHOOTING:
#   - Check logs: docker-compose logs -f [service_name]
#   - Restart services: docker-compose restart
#   - Full rebuild: docker-compose down -v && docker-compose up -d --build
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 - Primary Database
  # ---------------------------------------------------------------------------
  # Stores users, licenses, and subscriptions
  # Health check ensures database is ready before dependent services start
  postgres:
    image: postgres:16-alpine
    container_name: ptah_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ptah_licenses}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ptah_licenses}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - ptah-network

  # ---------------------------------------------------------------------------
  # Redis 7 - Cache and Session Store
  # ---------------------------------------------------------------------------
  # Used for:
  #   - PKCE state storage (OAuth 2.1 flow)
  #   - Session management
  #   - Rate limiting (future)
  #   - Caching (future)
  redis:
    image: redis:7-alpine
    container_name: ptah_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - '${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - ptah-network

  # ---------------------------------------------------------------------------
  # License Server - NestJS Application
  # ---------------------------------------------------------------------------
  # Main application handling:
  #   - License verification and generation
  #   - WorkOS authentication (PKCE)
  #   - Paddle payment webhooks
  #   - User management
  #
  # Hot-reload enabled via volume mount in development
  license-server:
    build:
      context: .
      dockerfile: apps/ptah-license-server/Dockerfile.dev
    container_name: ptah_license_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - apps/ptah-license-server/.env
    environment:
      # Override database URLs to use Docker network hostnames
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ptah_licenses}
      REDIS_URL: redis://redis:6379
      # Ensure NODE_ENV is set for development
      NODE_ENV: development
      # Disable Nx daemon - it doesn't work in Docker containers
      # The daemon tries to spawn worker processes which fail in containerized environments
      NX_DAEMON: 'false'
    volumes:
      # Mount source code for hot-reload
      - ./apps/ptah-license-server/src:/app/apps/ptah-license-server/src:delegated
      # Mount Prisma schema for migrations
      - ./apps/ptah-license-server/prisma:/app/apps/ptah-license-server/prisma:delegated
      # Mount Prisma config file (must be at app root, not in prisma/ directory)
      - ./apps/ptah-license-server/prisma.config.ts:/app/apps/ptah-license-server/prisma.config.ts:delegated
      # Use named volume for node_modules to prevent OS filesystem overhead
      - license-server-node-modules:/app/node_modules
    ports:
      - '${LICENSE_SERVER_PORT:-3000}:3000'
    # Run Prisma migrations before starting the server
    # Prisma 7 requires running commands from app directory to find prisma.config.ts
    # IMPORTANT: migrate deploy MUST run BEFORE generate (official Prisma Docker guide)
    command: >
      sh -c "
        echo 'Waiting for database to be ready...' &&
        cd apps/ptah-license-server &&
        echo 'Running database migrations...' &&
        npx prisma migrate deploy &&
        echo 'Generating Prisma Client...' &&
        npx prisma generate &&
        cd /app &&
        echo 'Starting license server in development mode...' &&
        npx nx serve ptah-license-server
      "
    networks:
      - ptah-network

  # ---------------------------------------------------------------------------
  # ngrok - Webhook Tunnel for Local Testing
  # ---------------------------------------------------------------------------
  # Exposes the license server to the internet via HTTPS tunnel
  # This allows Paddle webhooks to reach your local development environment
  #
  # SETUP:
  #   1. Get free ngrok account: https://dashboard.ngrok.com/signup
  #   2. Get your authtoken: https://dashboard.ngrok.com/get-started/your-authtoken
  #   3. Add to .env.docker: NGROK_AUTHTOKEN=your_token_here
  #   4. Start services: docker-compose up -d
  #   5. Get public URL: docker-compose logs ngrok | grep "started tunnel"
  #   6. Configure Paddle webhook URL: https://YOUR-NGROK-URL.ngrok.io/webhooks/paddle
  #
  # NOTE: Free ngrok accounts get random URLs that change on restart.
  # For static URLs, upgrade to ngrok paid plan or use alternative tunneling service.
  ngrok:
    image: ngrok/ngrok:latest
    container_name: ptah_ngrok
    restart: unless-stopped
    command:
      - 'http'
      - 'license-server:3000'
      - '--log=stdout'
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    depends_on:
      - license-server
    networks:
      - ptah-network
    profiles:
      - webhook-testing
    # ngrok doesn't expose ports to host - access via logs to get public URL

# =============================================================================
# Named Volumes
# =============================================================================
# Named volumes persist data between container restarts
# To clear all data: docker-compose down -v
volumes:
  # PostgreSQL data persistence
  postgres-data:
    name: ptah_postgres_data
  # Redis data persistence (AOF enabled)
  redis-data:
    name: ptah_redis_data
  # Node modules cache (improves Windows/macOS performance)
  license-server-node-modules:
    name: ptah_license_server_node_modules

# =============================================================================
# Networks
# =============================================================================
# Bridge network allows containers to communicate using service names
networks:
  ptah-network:
    name: ptah_network
    driver: bridge
