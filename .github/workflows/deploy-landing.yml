name: Deploy Landing Page

on:
  push:
    branches:
      - release/landing
  workflow_dispatch:

concurrency:
  group: deploy-landing
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Build landing page
        run: npx nx run-many -t build --projects=ptah-landing-page

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Deploy
        run: |
          doctl apps update ${{ secrets.DO_APP_ID }} --spec .do/app.yaml
          doctl apps create-deployment ${{ secrets.DO_APP_ID }} --wait
