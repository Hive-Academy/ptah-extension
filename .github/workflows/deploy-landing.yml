name: Deploy Landing Page

on:
  push:
    branches:
      - release/landing
  workflow_dispatch:

concurrency:
  group: deploy-landing
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: 22
  NX_TUI: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Match the DO buildpack + lockfile resolution (engines.npm >= 11).
      # node 22 ships npm 10, which rejects our npm-11 lockfile; pin npm 11
      # so `npm ci` validates cleanly instead of always hitting the fallback.
      - name: Pin npm to 11
        run: npm install -g npm@^11.0.0

      # Cache node_modules — skips npm ci on cache hit
      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        # Workaround for npm/cli#4828: package-lock.json generated on Windows
        # omits Linux rollup platform binaries. Install them explicitly.
        # Fall back to `npm install` if `npm ci` fails on transitive drift.
        run: |
          npm ci || npm install --no-audit --no-fund
          npm install @rollup/rollup-linux-x64-gnu --no-save --force

      - name: Build landing page
        run: npx nx run-many -t build --projects=ptah-landing-page

      # Fail loudly if the SSG build silently degraded to an empty CSR shell.
      # Asserts the prerendered routes shipped real content instead of an empty
      # <app-root>. Copy-specific greps are structural for now (old design) and
      # get tightened to the repositioned headlines when Batch F copy lands.
      - name: Assert prerendered content
        run: |
          set -euo pipefail
          DIST="dist/ptah-landing-page/browser"
          fail() { echo "::error::prerender assertion failed: $1"; exit 1; }

          for route in "index.html" "download/index.html" "pricing/index.html" \
            "terms-and-conditions/index.html" "privacy/index.html" "refund/index.html"; do
            [ -f "$DIST/$route" ] || fail "$route missing from build output"
            grep -qi "<h1" "$DIST/$route" || fail "$route has no <h1> (empty prerender?)"
            grep -q "<app-root></app-root>" "$DIST/$route" && fail "$route is an empty CSR shell"
          done

          # index.csr.html is the client-bootstrap fallback the catchall points to.
          [ -f "$DIST/index.csr.html" ] || fail "index.csr.html (catchall document) missing"

          # Home route must carry structured data for SEO/GEO.
          grep -q 'application/ld+json' "$DIST/index.html" || fail "index.html missing JSON-LD"

          echo "Prerender content assertion passed for 6 routes + catchall shell."

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Deploy
        run: |
          doctl apps update ${{ secrets.DO_APP_ID }} --spec .do/app.yaml
          doctl apps create-deployment ${{ secrets.DO_APP_ID }} --wait
