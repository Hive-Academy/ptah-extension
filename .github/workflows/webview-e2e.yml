name: Webview E2E

on:
  pull_request:
    branches:
      - main
    paths:
      - 'apps/ptah-extension-webview/**'
      - 'libs/frontend/**'
      - 'libs/frontend/webview-e2e-harness/**'
      - '.github/workflows/webview-e2e.yml'
  schedule:
    - cron: '0 6 * * *'

concurrency:
  group: webview-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

env:
  NODE_VERSION: 22
  NX_TUI: false

jobs:
  webview-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      (github.event_name != 'pull_request' || github.event.pull_request.state == 'open') &&
      !contains(github.event.head_commit.message, 'chore(release)')
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        # Fall back to `npm install` if lockfile drift (npm/cli#4828).
        run: |
          npm ci || npm install --no-audit --no-fund
          npm install @rollup/rollup-linux-x64-gnu --no-save --force

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers (chromium)
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Set NX SHAs
        uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: main

      # P3 webview E2E gate (TASK_2026_100). Runs the Playwright scenarios
      # under libs/frontend/webview-e2e-harness/. Runtime budget < 90s.
      - name: Run webview E2E specs
        run: npx playwright test --config libs/frontend/webview-e2e-harness/playwright.config.ts

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: libs/frontend/webview-e2e-harness/playwright-report/
          retention-days: 7
