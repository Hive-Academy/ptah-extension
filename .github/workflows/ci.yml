name: CI

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.vscode/**'
      - '.claude/**'
      - 'LICENSE.md'
      - '.do/**'

# Cancel in-progress runs for the same branch/PR — only the latest push matters
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

env:
  NODE_VERSION: 22
  NX_TUI: false

jobs:
  main:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Skip if PR was closed/merged, or if commit message is a version bump
    if: |
      (github.event_name != 'pull_request' || github.event.pull_request.state == 'open') &&
      !contains(github.event.head_commit.message, 'chore(release)')
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Cache node_modules directly — skips npm ci entirely on cache hit
      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm ci

      # Always run — cached node_modules may be missing Linux platform
      # binaries (npm/cli#4828: package-lock.json generated on Windows omits
      # them). Without unrs-resolver, jest can't resolve preset paths.
      - name: Install Linux platform binaries
        run: npm install @rollup/rollup-linux-x64-gnu @unrs/resolver-binding-linux-x64-gnu --no-save --force

      # Cache key is keyed on package-lock.json only. When the runner Node
      # ABI changes (or when the cache was populated by a different OS), the
      # better-sqlite3 prebuilt binary fails to self-register at require()
      # time. Rebuilding it is cheap and idempotent — always run.
      - name: Rebuild native modules for runner Node ABI
        run: npm rebuild better-sqlite3

      # Cache Prisma generated client
      - name: Cache Prisma client
        id: cache-prisma
        uses: actions/cache@v4
        with:
          path: node_modules/.prisma
          key: prisma-${{ runner.os }}-${{ hashFiles('apps/ptah-license-server/prisma/schema.prisma') }}

      - name: Generate Prisma client
        if: steps.cache-prisma.outputs.cache-hit != 'true'
        run: npx nx run ptah-license-server:prisma:generate

      - name: Set NX SHAs
        uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: main

      # Required coverage gate (TASK_2025_294 W8.B1). Per-project
      # `coverageThreshold` stanzas in each `jest.config.ts` are ratcheted
      # to the current baseline rounded down to the nearest 5. A drop below
      # the floor fails the job; specs are free to increase coverage.
      - name: Run affected tests with coverage
        run: npx nx affected -t test --coverage --parallel=3

      - run: npx nx affected -t build --exclude=infra-test
