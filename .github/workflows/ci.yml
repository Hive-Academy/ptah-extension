name: CI

on:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.vscode/**'
      - '.claude/**'
      - 'LICENSE'
      - '.do/**'

# Cancel in-progress runs for the same branch/PR — only the latest push matters
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

env:
  NX_TUI: 'false'

jobs:
  main:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Skip if PR was closed/merged, or if commit message is a version bump
    if: |
      (github.event_name != 'pull_request' || github.event.pull_request.state == 'open') &&
      !contains(github.event.head_commit.message, 'chore(release)')
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      # Generate Prisma client types (required for typecheck/build of license server)
      - run: npx nx run ptah-license-server:prisma:generate

      # Set NX_BASE for affected comparison
      # PR: compare against the base branch; Push to main: compare against previous commit
      - name: Set NX SHAs
        uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: main

      - run: npx nx affected -t build --exclude=infra-test
        env:
          NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
