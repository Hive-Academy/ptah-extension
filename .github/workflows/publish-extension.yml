# Publish VS Code Extension
#
# Workflow:
#   1. Push to release/extension branch OR trigger manually with bump type
#   2. Bumps the version in apps/ptah-extension-vscode/package.json
#   3. Checks if the version tag already exists (prevents duplicate publishes)
#   4. Builds, packages, and publishes to VS Code Marketplace
#   5. Creates git tag and opens a PR to merge the version bump into main
#
# Version bump goes to a chore/ branch with a PR to main — never pushes back
# to release/extension (which would re-trigger this workflow in an infinite loop).
# A commit message filter provides extra safety.
#
# Manual dispatch lets you choose bump type (patch/minor/major) and pre-release.

name: Publish Extension

on:
  push:
    branches:
      - release/extension
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      pre-release:
        description: 'Publish as pre-release'
        required: false
        type: boolean
        default: false

concurrency:
  group: publish-extension
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

env:
  NODE_VERSION: 22
  NX_TUI: 'false'

jobs:
  publish:
    runs-on: ubuntu-latest
    # Skip version-bump commits to prevent infinite loop
    if: >-
      github.event_name == 'workflow_dispatch' ||
      !startsWith(github.event.head_commit.message, 'chore(release):')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Cache node_modules — skips npm ci on cache hit
      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        # Workaround for npm/cli#4828: package-lock.json generated on Windows
        # omits Linux rollup platform binaries. Install them explicitly.
        run: |
          npm ci
          npm install @rollup/rollup-linux-x64-gnu --no-save --force

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        working-directory: apps/ptah-extension-vscode
        run: |
          BUMP_TYPE="${{ github.event.inputs.bump || 'patch' }}"
          OLD_VERSION=$(node -p "require('./package.json').version")

          NEW_VERSION=$(node -e "
            const [major, minor, patch] = '${OLD_VERSION}'.split('.').map(Number);
            const bump = '${BUMP_TYPE}';
            if (bump === 'major') console.log(\`\${major+1}.0.0\`);
            else if (bump === 'minor') console.log(\`\${major}.\${minor+1}.0\`);
            else console.log(\`\${major}.\${minor}.\${patch+1}\`);
          ")

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${NEW_VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          echo "old_version=$OLD_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=extension-v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped $OLD_VERSION -> $NEW_VERSION ($BUMP_TYPE)"

      - name: Check if tag exists
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.bump.outputs.tag }}" | grep -q .; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "::error::Tag ${{ steps.bump.outputs.tag }} already exists. The version ${{ steps.bump.outputs.new_version }} has already been published."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Abort if tag exists
        if: steps.check.outputs.should_publish != 'true'
        run: exit 1

      - name: Quality gates
        run: npx nx run-many -t typecheck --projects=ptah-extension-vscode

      - name: Clean dist
        run: rm -rf dist/apps/ptah-extension-vscode

      - name: Build and package extension
        run: npx nx run ptah-extension-vscode:package

      - name: Verify version in dist
        run: |
          DIST_VERSION=$(node -p "require('./dist/apps/ptah-extension-vscode/package.json').version")
          EXPECTED="${{ steps.bump.outputs.new_version }}"
          echo "Dist version: $DIST_VERSION (expected: $EXPECTED)"
          if [ "$DIST_VERSION" != "$EXPECTED" ]; then
            echo "::warning::Version mismatch! Patching dist package.json..."
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('dist/apps/ptah-extension-vscode/package.json', 'utf8'));
              pkg.version = '${EXPECTED}';
              fs.writeFileSync('dist/apps/ptah-extension-vscode/package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
            echo "Patched to $EXPECTED"
          fi

      - name: Publish to VS Code Marketplace
        run: |
          cd dist/apps/ptah-extension-vscode
          VSIX_FILE=$(ls *.vsix 2>/dev/null | head -1)
          if [ -z "$VSIX_FILE" ]; then
            echo "::error::No .vsix file found in dist"
            exit 1
          fi
          VSIX_SIZE=$(du -h "$VSIX_FILE" | cut -f1)
          echo "Publishing $VSIX_FILE ($VSIX_SIZE)"
          if [ "${{ github.event.inputs.pre-release }}" = "true" ]; then
            npx @vscode/vsce publish --packagePath "$VSIX_FILE" --pre-release --pat ${{ secrets.VSCE_PAT }}
          else
            npx @vscode/vsce publish --packagePath "$VSIX_FILE" --pat ${{ secrets.VSCE_PAT }}
          fi

      - name: Create version bump PR to main
        env:
          HUSKY: '0'
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          VERSION="${{ steps.bump.outputs.new_version }}"
          TAG="${{ steps.bump.outputs.tag }}"
          BRANCH="chore/bump-extension-v${VERSION}"

          # Save the bumped package.json
          cp apps/ptah-extension-vscode/package.json /tmp/bumped-package.json

          # Create a fresh branch from main
          git fetch origin main
          git checkout -b "$BRANCH" origin/main

          # Apply version bump
          cp /tmp/bumped-package.json apps/ptah-extension-vscode/package.json
          git add apps/ptah-extension-vscode/package.json
          git commit --no-verify -m "chore(release): extension v${VERSION}"

          # Tag the release
          git tag -a "$TAG" -m "VS Code Extension v${VERSION}"

          # Push branch and tag
          git push origin "$BRANCH" --tags

          # Create PR to main
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(release): extension v${VERSION}" \
            --body "Auto-generated version bump after publishing extension v${VERSION} to VS Code Marketplace."
