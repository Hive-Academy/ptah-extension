# Ptah CLI E2E Harness — TASK_2026_110
#
# INFORMATIONAL workflow until 2026-05-09 (7-day stabilization window from 2026-05-02).
# After 7 days of green runs, promote to a required PR status check via branch protection
# (manual repo settings change; this workflow file does not enforce it).
#
# Pipeline:
#   1. checkout + node 22
#   2. cache-aware npm ci (rollup linux binary workaround for Linux runner)
#   3. nx run ptah-cli:restore-cli-manifest — builds the full installed-bundle
#      layout the harness spawns (main.mjs + tui.mjs + embedder-worker.mjs +
#      package.json); `nx build ptah-cli` alone omits tui.mjs / embedder.
#   4. npm rebuild better-sqlite3 — undo postinstall's Electron-ABI compile so
#      the CLI's DB-backed commands load under the runner Node ABI.
#   5. jest e2e specs directly via the harness config
#   6. upload jest report as artifact on failure

name: CLI E2E

on:
  push:
    branches:
      - main
      - release/cli
  pull_request:
    branches:
      - main
    paths:
      - 'apps/ptah-cli/**'
      - 'libs/backend/**'
      - 'libs/shared/**'
      - '.github/workflows/cli-e2e.yml'

concurrency:
  group: cli-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: 22
  NX_TUI: 'false'

jobs:
  cli-e2e:
    name: CLI E2E (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node-version: ['22']
    runs-on: ${{ matrix.os }}
    # Matches the other E2E jobs' headroom. The restore-cli-manifest chain
    # (34 tasks) plus the full jest e2e harness overruns 10m on a cold
    # node_modules / Nx cache even though the specs themselves pass quickly.
    timeout-minutes: 20
    defaults:
      run:
        # Use bash on both Linux and Windows (Git Bash) so step scripts behave
        # identically across runners. Without this, Windows defaults to pwsh
        # and breaks POSIX-flavoured commands.
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        # Fall back to `npm install` if lockfile drift (npm/cli#4828).
        run: |
          npm ci || npm install --no-audit --no-fund
          if [ "${{ runner.os }}" = "Linux" ]; then
            npm install @rollup/rollup-linux-x64-gnu --no-save --force
          fi

      # Build the COMPLETE installed-bundle layout the harness spawns:
      # main.mjs + tui.mjs + embedder-worker.mjs + the copied package.json.
      # `nx build ptah-cli` alone emits only main.mjs (deleteOutputPath wipes
      # the dir) — the tui smoke suite then fails because dist/.../tui.mjs is
      # absent. `restore-cli-manifest` is the same chain `nx e2e` runs and
      # produces every artifact. (cli-engine already depends on the full
      # backend + electron graph, so this is not heavier than the old build.)
      - name: Build CLI + TUI harness bundles
        run: npx nx run ptah-cli:restore-cli-manifest

      # `npm ci`'s postinstall (rebuild-native.js) compiles better-sqlite3 for
      # the Electron ABI (143), but this harness spawns the CLI under the runner
      # Node ABI. Without this rebuild every DB-backed command (memory / cron /
      # skill-synthesis / gateway bindings) fails with a NODE_MODULE_VERSION
      # mismatch -> ExitCode.InternalFailure (5). Run AFTER the build (the nx
      # build chain never recompiles native modules) and before jest spawns the
      # CLI. Idempotent; always run.
      - name: Rebuild native modules for runner Node ABI
        run: npm rebuild better-sqlite3

      - name: Run CLI e2e harness
        # Invoke jest directly (NOT `nx e2e ptah-cli`) so the harness controls
        # the run; the build step above already produced the full dist layout.
        run: npx jest --config apps/ptah-cli/jest.e2e.config.cjs --runInBand

      - name: Upload jest report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cli-e2e-report-${{ matrix.os }}
          path: |
            apps/ptah-cli/test-output/
            apps/ptah-cli/coverage/
          retention-days: 7
          if-no-files-found: ignore
