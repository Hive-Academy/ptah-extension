# Publish Electron App
#
# Cross-platform Electron builds for Windows, macOS, and Linux.
#
# Workflow:
#   1. Push to release/electron branch OR trigger manually with bump type
#   2. Auto-bumps the version (computed in prepare, patched locally in build jobs)
#   3. Checks if the version tag already exists (prevents duplicate releases)
#   4. Builds for all 3 platforms in parallel
#   5. Creates git tag + GitHub Release with all installers
#   6. Opens a PR to merge the version bump into main
#
# Version bump goes to a chore/ branch with a PR to main — never pushes back
# to release/electron (which would re-trigger this workflow in an infinite loop).
# A commit message filter provides extra safety.
#
# Windows builds are signed with SSL.com eSigner (IV code signing certificate).
# macOS and Linux builds are unsigned — macOS signing requires an Apple Developer account.

name: Publish Electron

on:
  push:
    branches:
      - 'release/electron'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

concurrency:
  group: publish-electron
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

env:
  NODE_VERSION: 22
  NX_TUI: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    # Skip version-bump commits to prevent infinite loop
    if: >-
      github.event_name == 'workflow_dispatch' ||
      !startsWith(github.event.head_commit.message, 'chore(release):')
    outputs:
      version: ${{ steps.bump.outputs.new_version }}
      tag: ${{ steps.bump.outputs.tag }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          BUMP_TYPE="${{ github.event.inputs.bump || 'patch' }}"
          OLD_VERSION=$(node -p "require('./apps/ptah-electron/package.json').version")

          # Strip any prerelease / build suffix before parsing so versions
          # like "1.2.3-rc.1" or "1.2.3+build" never produce NaN segments.
          NEW_VERSION=$(node -e "
            const base = '${OLD_VERSION}'.split(/[-+]/)[0];
            const parts = base.split('.').map(Number);
            if (parts.length !== 3 || parts.some(Number.isNaN)) {
              console.error('Invalid base version: ${OLD_VERSION} -> ' + base);
              process.exit(1);
            }
            const [major, minor, patch] = parts;
            const bump = '${BUMP_TYPE}';
            if (bump === 'major') console.log(\`\${major+1}.0.0\`);
            else if (bump === 'minor') console.log(\`\${major}.\${minor+1}.0\`);
            else console.log(\`\${major}.\${minor}.\${patch+1}\`);
          ")

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('apps/ptah-electron/package.json', 'utf8'));
            pkg.version = '${NEW_VERSION}';
            fs.writeFileSync('apps/ptah-electron/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          echo "old_version=$OLD_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=electron-v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped $OLD_VERSION -> $NEW_VERSION ($BUMP_TYPE)"

      - name: Check if tag exists
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.bump.outputs.tag }}" | grep -q .; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "::error::Tag ${{ steps.bump.outputs.tag }} already exists."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Abort if tag exists
        if: steps.check.outputs.should_release != 'true'
        run: exit 1

      # Version bump is NOT pushed back to release/electron (that would
      # re-trigger this workflow in an infinite loop). Build jobs receive the
      # new version via the prepare.outputs.version output and patch locally.

  build:
    needs: prepare
    runs-on: ${{ matrix.os }}
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build-args: --win
          - os: macos-latest
            build-args: --mac
          - os: ubuntu-latest
            build-args: --linux

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Patch version from prepare output
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('apps/ptah-electron/package.json', 'utf8'));
            pkg.version = '${{ needs.prepare.outputs.version }}';
            fs.writeFileSync('apps/ptah-electron/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Patched electron version to ${{ needs.prepare.outputs.version }}"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Cache node_modules per OS — skips npm ci on cache hit
      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        # Fall back to `npm install` if lockfile drift (npm/cli#4828).
        run: npm ci || npm install --no-audit --no-fund

      # Workaround for npm/cli#4828: package-lock.json generated on Windows
      # omits Linux rollup platform binaries. Install them explicitly.
      - name: Install rollup Linux binary (Linux only)
        if: runner.os == 'Linux'
        run: npm install @rollup/rollup-linux-x64-gnu --no-save --force

      # dmg-license is a required dep of dmg-builder but is macOS-native and was excluded
      # from the lock file (generated on Windows). Install it explicitly on macOS.
      - name: Install dmg-license (macOS only)
        if: runner.os == 'macOS'
        run: npm install dmg-license --no-save

      # Python 3.12+ removed distutils; setuptools restores it for node-gyp native builds
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fix Python distutils (native module builds)
        run: python -m pip install setuptools

      # Rebuild better-sqlite3 for the runner's Node ABI before the real-native
      # migration tests run, so Jest can require() it directly and the SQL-M
      # tests actually execute. It is recompiled for the Electron ABI by the
      # "Rebuild better-sqlite3 for Electron ABI (pre-pack, from source)" step
      # below, before electron-builder packs node_modules (npmRebuild: false).
      - name: Rebuild better-sqlite3 for runner Node ABI
        run: npm rebuild better-sqlite3

      # Cross-platform gate against Sentry NODE-NESTJS-46/47: runs the
      # persistence-sqlite suite against real better-sqlite3 + the platform's
      # sqlite-vec binary. The SQL-M block auto-detects native availability,
      # so this is the only path that exercises real vec0 DDL and the 0007
      # DROP+CREATE on Windows/macOS/Linux before we ship.
      - name: Run persistence-sqlite native tests (real better-sqlite3 + sqlite-vec)
        run: npx nx test persistence-sqlite

      - name: Build Electron app
        run: npx nx build ptah-electron

      # Pre-pack guard: refuses to publish if the platform's sqlite-vec
      # native binary is missing on disk — would otherwise ship a broken
      # installer (asarUnpack glob matches nothing) and crash on first run.
      - name: Validate native deps (sqlite-vec binary present)
        run: npx nx validate-deps ptah-electron

      - name: Copy renderer
        run: npx nx copy-renderer ptah-electron

      # CRITICAL: compile better-sqlite3 for the Electron ABI before packaging.
      # The `npm rebuild better-sqlite3` step above built it for the runner's
      # Node ABI so Jest could require() it for the native persistence tests.
      # electron-builder runs with `npmRebuild: false`, so it packs node_modules
      # as-is. better-sqlite3 ships NO Electron-40 prebuilt (only up to
      # electron-v136 / Electron 37), so rebuild-native.js compiles it from
      # source via @electron/rebuild. Without this the installer ships a
      # Node-ABI binary that crashes Electron 40 with NODE_MODULE_VERSION
      # mismatch (Memory/Skills/Cron/Gateway/Corpus all report
      # PERSISTENCE_UNAVAILABLE on first run — Sentry 124004638).
      - name: Rebuild better-sqlite3 for Electron ABI (pre-pack, from source)
        run: node apps/ptah-electron/scripts/rebuild-native.js
        env:
          _CL_: ${{ runner.os == 'Windows' && '/std:c++20' || '' }}
          CXXFLAGS: ${{ runner.os != 'Windows' && '-std=c++20' || '' }}

      # CRITICAL: re-copy the tree-sitter WASM immediately before packing.
      # `nx build` runs copy-wasm.js, but the intervening `nx validate-deps`
      # and `nx copy-renderer` steps depend on build-main, whose cached output
      # is the whole dist/apps/ptah-electron dir snapshotted BEFORE copy-wasm
      # ran — a cache restore wipes wasm/ from dist. Re-running copy-wasm here
      # (idempotent) guarantees the runtime + grammars are present for the asar.
      # Without it the workspace indexer and every AST feature silently no-op
      # (web-tree-sitter.wasm not found in app.asar).
      - name: Copy tree-sitter WASM (re-copy pre-pack)
        run: node scripts/copy-wasm.js dist/apps/ptah-electron

      # macOS / Linux: single-shot package (build app + distributable together).
      # Windows is split below into dir-build -> sign-internals -> repack-NSIS so
      # every internal binary (Ptah.exe, *.dll, and the asarUnpacked
      # better_sqlite3.node) carries the SSL.com IV signature, not just the
      # outer installer. SAC/WDAC evaluate each native module at load time, so
      # an unsigned better_sqlite3.node is blocked even when the installer is
      # signed — taking SQLite (Memory/Skills/Schedules/Messaging) offline.
      - name: Package for platform
        if: runner.os != 'Windows'
        run: npx electron-builder --config electron-builder.yml --project dist/apps/ptah-electron --publish never ${{ matrix.build-args }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # tree-sitter 0.21.x binding.gyp forces C++17, but Electron V8 headers require C++20
          CXXFLAGS: '-std=c++20'

      # Post-pack gates for macOS/Linux (Windows runs its own copies inside the
      # split signing flow below). Prove the packed better-sqlite3 ABI and the
      # tree-sitter WASM assets are present before shipping.
      - name: Verify packed better-sqlite3 ABI (macOS/Linux)
        if: runner.os != 'Windows'
        run: node apps/ptah-electron/scripts/verify-packed-native.js

      - name: Verify packed tree-sitter WASM (macOS/Linux)
        if: runner.os != 'Windows'
        run: node apps/ptah-electron/scripts/verify-packed-wasm.js

      # ---- Windows packaging + signing (split into 3 phases) ----------------
      # Phase 1: build win-unpacked ONLY (--dir). No NSIS yet. The win-unpacked
      # tree is real on-disk files we can sign before the installer wraps them.
      - name: Package Windows (win-unpacked only, no installer)
        if: runner.os == 'Windows'
        run: npx electron-builder --config electron-builder.yml --project dist/apps/ptah-electron --publish never --win --dir
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          _CL_: /std:c++20

      # Phase 1 gates: prove the packed better-sqlite3 ABI + tree-sitter WASM are
      # correct in win-unpacked BEFORE we sign and repack. verify-packed-native
      # scans dist/release recursively and finds win-unpacked/.../app.asar.unpacked
      # /node_modules/better-sqlite3/build/Release/better_sqlite3.node. WASM lives
      # inside win-unpacked/resources/app.asar (verify-packed-wasm scans for that).
      - name: Verify packed better-sqlite3 ABI (win-unpacked, pre-sign)
        if: runner.os == 'Windows'
        run: node apps/ptah-electron/scripts/verify-packed-native.js

      - name: Verify packed tree-sitter WASM (win-unpacked, pre-sign)
        if: runner.os == 'Windows'
        run: node apps/ptah-electron/scripts/verify-packed-wasm.js

      # Phase 2a: collect EVERY signable binary in win-unpacked and flat-stage it
      # into dist/sign-stage. We sign via a single batch_sign call (one OTP for
      # up to 100 files) instead of per-file `sign` (one OTP each — TOTP rate
      # limits + N round-trips). CodeSignTool only recognizes Authenticode
      # extensions (.exe/.dll/.sys/...) and does NOT recognize ".node", so each
      # .node is staged with a ".dll" extension. Authenticode signatures live in
      # the PE overlay, independent of extension, so the signature survives the
      # rename back to .node and SAC/WDAC read it correctly at load time.
      # A JSON manifest records staged-name -> original-path for copy-back.
      - name: Stage Windows binaries for batch signing
        if: runner.os == 'Windows'
        id: stage-sign
        shell: pwsh
        run: |
          $unpacked = "dist\release\win-unpacked"
          if (-not (Test-Path $unpacked)) { throw "win-unpacked not found at $unpacked" }
          $stage = "dist\sign-stage"
          Remove-Item -Recurse -Force $stage -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          # CodeSignTool batch_sign writes signed files to output_path and does
          # NOT overwrite input in place — output_path MUST differ from dir_path,
          # otherwise the originals stay unsigned (Get-AuthenticodeSignature ->
          # NotSigned). Sign into a separate dir and copy back from there.
          $signedDir = "dist\sign-out"
          Remove-Item -Recurse -Force $signedDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $signedDir | Out-Null

          # Extension alone is not enough: node_modules ships cross-platform native
          # addons, so a Linux (.node = ELF) or macOS (.node = Mach-O) binary can
          # carry a .node/.dll name yet not be a Windows PE. CodeSignTool's
          # batch_sign hashes every file as a PE and aborts on the first one
          # without an "MZ" DOS header ("DOS header signature not found"). Filter
          # to real PE files by reading the first two magic bytes (0x4D 0x5A).
          $candidates = Get-ChildItem -Path $unpacked -Recurse -File |
            Where-Object { $_.Extension -in '.exe', '.dll', '.node' }
          $binaries = @()
          $skipped = @()
          foreach ($c in $candidates) {
            $fs = [System.IO.File]::OpenRead($c.FullName)
            try { $b0 = $fs.ReadByte(); $b1 = $fs.ReadByte() } finally { $fs.Dispose() }
            if ($b0 -eq 0x4D -and $b1 -eq 0x5A) { $binaries += $c } else { $skipped += $c }
          }
          if ($skipped.Count -gt 0) {
            Write-Host "Skipping $($skipped.Count) non-PE file(s) (no MZ header — not Windows binaries):"
            $skipped | ForEach-Object { Write-Host "  SKIP $($_.FullName)" }
          }
          if ($binaries.Count -eq 0) { throw "No Windows PE (.exe/.dll/.node) binaries found under $unpacked" }
          if ($binaries.Count -gt 100) {
            throw "Found $($binaries.Count) binaries — CodeSignTool batch_sign caps at 100 per OTP. Split into batches."
          }

          $manifest = @()
          $i = 0
          foreach ($b in $binaries) {
            $i++
            # CodeSignTool rejects unknown extensions; map .node -> .dll for signing.
            $signExt = if ($b.Extension -eq '.node') { '.dll' } else { $b.Extension }
            # Flat, collision-free staged name (the tree has many better_sqlite3.node etc.).
            $stagedName = "{0:D3}_{1}{2}" -f $i, $b.BaseName, $signExt
            $stagedPath = Join-Path $stage $stagedName
            Copy-Item -LiteralPath $b.FullName -Destination $stagedPath -Force
            $manifest += [pscustomobject]@{ staged = $stagedName; original = $b.FullName }
          }

          $manifestPath = "dist\sign-manifest.json"
          $manifest | ConvertTo-Json -Depth 3 | Out-File -FilePath $manifestPath -Encoding utf8
          Write-Host "Staged $($binaries.Count) binaries into $stage for batch signing:"
          $binaries | ForEach-Object { Write-Host "  $($_.FullName)" }
          echo "stage_dir=$stage" >> $env:GITHUB_OUTPUT
          echo "signed_dir=$signedDir" >> $env:GITHUB_OUTPUT
          echo "manifest=$manifestPath" >> $env:GITHUB_OUTPUT
          echo "count=$($binaries.Count)" >> $env:GITHUB_OUTPUT

      # Phase 2b: ONE batch_sign call signs every staged binary in place (output
      # written back into the same staging dir). Single OTP for the whole batch.
      - name: Batch-sign Windows internal binaries with SSL.com eSigner
        if: runner.os == 'Windows'
        uses: sslcom/esigner-codesign@v1.3.2
        with:
          command: batch_sign
          username: ${{ secrets.SSL_COM_USERNAME }}
          password: ${{ secrets.SSL_COM_PASSWORD }}
          credential_id: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.SSL_COM_TOTP_SECRET }}
          dir_path: ${{ steps.stage-sign.outputs.stage_dir }}
          output_path: ${{ steps.stage-sign.outputs.signed_dir }}
          override: true
          environment_name: PROD
          malware_block: false

      # Phase 2c: copy each signed binary back over its original nested location
      # (restoring the .node extension). Fail loudly if a staged file is missing
      # or did not actually receive an Authenticode signature.
      - name: Copy signed binaries back into win-unpacked
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $signedDir = "${{ steps.stage-sign.outputs.signed_dir }}"
          $manifest = Get-Content "${{ steps.stage-sign.outputs.manifest }}" -Raw | ConvertFrom-Json
          $missing = @()
          $unsigned = @()
          foreach ($entry in $manifest) {
            $signed = Join-Path $signedDir $entry.staged
            if (-not (Test-Path $signed)) { $missing += $entry.staged; continue }
            $sig = Get-AuthenticodeSignature -LiteralPath $signed
            if ($sig.Status -ne 'Valid') { $unsigned += "$($entry.staged) [$($sig.Status)]" }
            Copy-Item -LiteralPath $signed -Destination $entry.original -Force
            Write-Host "Signed -> $($entry.original)  [$($sig.Status)]"
          }
          if ($missing.Count -gt 0) { throw "batch_sign did not produce: $($missing -join ', ')" }
          if ($unsigned.Count -gt 0) { throw "Binaries lack a Valid signature after batch_sign: $($unsigned -join ', ')" }
          Write-Host "All $($manifest.Count) internal binaries signed and copied back."

      # Phase 3: build the NSIS installer FROM the now-signed win-unpacked dir.
      # --prepackaged packs the distributable from the existing app dir without
      # re-running asar packing or re-copying node_modules, so the signed
      # internal binaries are carried verbatim into the installer.
      - name: Package Windows installer from signed app (NSIS)
        if: runner.os == 'Windows'
        run: npx electron-builder --config electron-builder.yml --project dist/apps/ptah-electron --publish never --win --prepackaged dist/release/win-unpacked
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Post-repack gates: re-prove ABI + WASM survived the NSIS repack. (The
      # installer embeds win-unpacked verbatim; these now also see the signed
      # better_sqlite3.node — its sha256 changed vs the root node_modules copy,
      # but the ABI-marker check still passes, which is the contract that matters.)
      - name: Verify packed better-sqlite3 ABI (post-repack)
        if: runner.os == 'Windows'
        run: node apps/ptah-electron/scripts/verify-packed-native.js

      - name: Verify packed tree-sitter WASM (post-repack)
        if: runner.os == 'Windows'
        run: node apps/ptah-electron/scripts/verify-packed-wasm.js

      - name: Find Windows installer
        if: runner.os == 'Windows'
        id: find-exe
        shell: pwsh
        run: |
          $exe = (Get-ChildItem -Path "dist\release" -Filter "*.exe" | Select-Object -First 1).FullName
          if (-not $exe) { throw "No .exe installer found to sign" }
          Write-Host "Found installer: $exe"
          echo "exe_path=$exe" >> $env:GITHUB_OUTPUT

      - name: Sign Windows installer with SSL.com eSigner
        if: runner.os == 'Windows'
        uses: sslcom/esigner-codesign@v1.3.2
        with:
          command: sign
          username: ${{ secrets.SSL_COM_USERNAME }}
          password: ${{ secrets.SSL_COM_PASSWORD }}
          credential_id: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.SSL_COM_TOTP_SECRET }}
          file_path: ${{ steps.find-exe.outputs.exe_path }}
          override: true
          environment_name: PROD
          malware_block: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.os }}
          path: |
            dist/release/
            !dist/release/win-unpacked/
            !dist/release/linux-unpacked/
            !dist/release/mac/
            !dist/release/mac-arm64/
          retention-days: 30

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Create git tag and version bump PR to main
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="${{ needs.prepare.outputs.tag }}"
          BRANCH="chore/bump-electron-v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Tag the release
          git tag -a "$TAG" -m "Electron Desktop App v${VERSION}"
          git push origin "$TAG"

          # Create a fresh branch from main with the version bump
          git fetch origin main
          git checkout -b "$BRANCH" origin/main
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('apps/ptah-electron/package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('apps/ptah-electron/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          git add apps/ptah-electron/package.json
          git commit --no-verify -m "chore(release): electron v${VERSION}"
          git push origin "$BRANCH"

          # Create PR to main
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(release): electron v${VERSION}" \
            --body "Auto-generated version bump after publishing Electron Desktop v${VERSION}."

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Rename installer files
        run: |
          # electron-builder NSIS uses spaces in filenames (e.g. "Ptah Setup 0.1.3.exe")
          # Rename to dots for cleaner download URLs
          find artifacts -type f -name "*Setup*.exe" -print0 | while IFS= read -r -d '' file; do
            newname=$(echo "$file" | sed 's/ /./g')
            if [ "$file" != "$newname" ]; then
              mv "$file" "$newname"
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Ptah Desktop v${{ needs.prepare.outputs.version }}
          draft: false
          generate_release_notes: true
          files: |
            artifacts/**/Ptah*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/latest*.yml
