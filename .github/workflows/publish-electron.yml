# Publish Electron App
#
# Cross-platform Electron builds for Windows, macOS, and Linux.
#
# Workflow:
#   1. Push to release/electron branch OR trigger manually with bump type
#   2. Auto-bumps the version in apps/ptah-electron/package.json
#   3. Checks if the version tag already exists (prevents duplicate releases)
#   4. Builds for all 3 platforms in parallel
#   5. Creates git tag + public GitHub Release with all installers
#   6. Commits the version bump back to the branch
#
# Phase 1: Unsigned builds — no code signing secrets configured.
# Users will see platform warnings ("unidentified developer") until
# code signing is added in a future phase.

name: Publish Electron

on:
  push:
    branches:
      - 'release/electron'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

concurrency:
  group: publish-electron
  cancel-in-progress: false

permissions:
  contents: write

env:
  NODE_VERSION: 22
  NX_TUI: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.new_version }}
      tag: ${{ steps.bump.outputs.tag }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          BUMP_TYPE="${{ github.event.inputs.bump || 'patch' }}"
          OLD_VERSION=$(node -p "require('./apps/ptah-electron/package.json').version")

          NEW_VERSION=$(node -e "
            const [major, minor, patch] = '${OLD_VERSION}'.split('.').map(Number);
            const bump = '${BUMP_TYPE}';
            if (bump === 'major') console.log(\`\${major+1}.0.0\`);
            else if (bump === 'minor') console.log(\`\${major}.\${minor+1}.0\`);
            else console.log(\`\${major}.\${minor}.\${patch+1}\`);
          ")

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('apps/ptah-electron/package.json', 'utf8'));
            pkg.version = '${NEW_VERSION}';
            fs.writeFileSync('apps/ptah-electron/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          echo "old_version=$OLD_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=electron-v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped $OLD_VERSION -> $NEW_VERSION ($BUMP_TYPE)"

      - name: Check if tag exists
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.bump.outputs.tag }}" | grep -q .; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "::error::Tag ${{ steps.bump.outputs.tag }} already exists."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Abort if tag exists
        if: steps.check.outputs.should_release != 'true'
        run: exit 1

      - name: Commit version bump
        env:
          HUSKY: '0'
        run: |
          git add apps/ptah-electron/package.json
          git commit --no-verify -m "chore(release): electron v${{ steps.bump.outputs.new_version }}"
          git push origin HEAD

  build:
    needs: prepare
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build-args: --win
          - os: macos-latest
            build-args: --mac
          - os: ubuntu-latest
            build-args: --linux

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Cache node_modules per OS — skips npm ci on cache hit
      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm ci

      # Python 3.12+ removed distutils; setuptools restores it for node-gyp native builds
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fix Python distutils (native module builds)
        run: python -m pip install setuptools

      - name: Build Electron app
        run: npx nx build ptah-electron

      - name: Copy renderer
        run: npx nx copy-renderer ptah-electron

      - name: Package for platform
        run: npx electron-builder --config electron-builder.yml --project dist/apps/ptah-electron --publish never ${{ matrix.build-args }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # tree-sitter 0.21.x binding.gyp forces C++17, but Electron 35 V8 headers require C++20
          # _CL_ is for MSVC (Windows), CXXFLAGS is for GCC/Clang (Linux/macOS)
          _CL_: ${{ runner.os == 'Windows' && '/std:c++20' || '' }}
          CXXFLAGS: ${{ runner.os != 'Windows' && '-std=c++20' || '' }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.os }}
          path: dist/release/
          retention-days: 30

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.prepare.outputs.tag }}" -m "Electron Desktop App v${{ needs.prepare.outputs.version }}"
          git push origin "${{ needs.prepare.outputs.tag }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create GitHub Release (private repo)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Ptah Desktop v${{ needs.prepare.outputs.version }}
          draft: false
          generate_release_notes: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/latest*.yml

      - name: Publish release to public repo (ptah-app)
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          VERSION="${{ needs.prepare.outputs.version }}"

          # Create the tag in the public repo via API
          # Get the default branch SHA
          DEFAULT_SHA=$(gh api repos/Hive-Academy/ptah-app/git/ref/heads/main --jq '.object.sha')

          # Create tag object
          TAG_SHA=$(gh api repos/Hive-Academy/ptah-app/git/tags \
            -f tag="$TAG" \
            -f message="Ptah Desktop v$VERSION" \
            -f object="$DEFAULT_SHA" \
            -f type="commit" \
            --jq '.sha')

          # Create tag reference
          gh api repos/Hive-Academy/ptah-app/git/refs \
            -f ref="refs/tags/$TAG" \
            -f sha="$TAG_SHA" || true

          # Collect installer files for public release
          # Note: electron-builder NSIS uses spaces in filenames (e.g. "Ptah Setup 0.1.3.exe")
          # We rename to dots for cleaner URLs, then use a mapfile to handle spaces safely
          find artifacts -type f \( \
            -name "*Setup*.exe" -o \
            -name "*.dmg" -o \
            -name "*.zip" -o \
            -name "*.AppImage" -o \
            -name "*.deb" -o \
            -name "latest*.yml" \
          \) -print0 | while IFS= read -r -d '' file; do
            # Rename spaces to dots in exe filenames for cleaner download URLs
            newname=$(echo "$file" | sed 's/ /./g')
            if [ "$file" != "$newname" ]; then
              mv "$file" "$newname"
            fi
          done

          # Now collect all renamed files
          ASSET_FILES=$(find artifacts -type f \( \
            -name "*Setup*.exe" -o \
            -name "*.dmg" -o \
            -name "*.zip" -o \
            -name "*.AppImage" -o \
            -name "*.deb" -o \
            -name "latest*.yml" \
          \) | tr '\n' ' ')

          # Create release notes file
          cat > /tmp/release-notes.md << NOTES_EOF
          ## Ptah Desktop v$VERSION

          Download the standalone desktop app for your platform:

          | Platform | File |
          | -------- | ---- |
          | **Windows** | Ptah.Setup.$VERSION.exe |
          | **macOS** | Ptah-$VERSION-arm64.dmg |
          | **Linux** | Ptah-$VERSION.AppImage |
          | **Linux (deb)** | ptah-desktop_${VERSION}_amd64.deb |

          > Builds are currently unsigned. You may see platform warnings on first launch.

          Learn more at [ptah.live](https://ptah.live)
          NOTES_EOF

          # Strip leading whitespace from each line
          sed -i 's/^          //' /tmp/release-notes.md

          gh release create "$TAG" \
            --repo Hive-Academy/ptah-app \
            --title "Ptah Desktop v$VERSION" \
            --notes-file /tmp/release-notes.md \
            $ASSET_FILES
