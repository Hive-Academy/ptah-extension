# Publish Electron App
#
# Cross-platform Electron builds for Windows, macOS, and Linux.
#
# Workflow:
#   1. Push to release/electron branch OR trigger manually with bump type
#   2. Auto-bumps the version in apps/ptah-electron/package.json
#   3. Checks if the version tag already exists (prevents duplicate releases)
#   4. Builds for all 3 platforms in parallel
#   5. Creates git tag + public GitHub Release with all installers
#   6. Commits the version bump back to the branch
#
# Phase 1: Unsigned builds — no code signing secrets configured.
# Users will see platform warnings ("unidentified developer") until
# code signing is added in a future phase.

name: Publish Electron

on:
  push:
    branches:
      - 'release/electron'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.new_version }}
      tag: ${{ steps.bump.outputs.tag }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          BUMP_TYPE="${{ github.event.inputs.bump || 'patch' }}"
          OLD_VERSION=$(node -p "require('./apps/ptah-electron/package.json').version")

          NEW_VERSION=$(node -e "
            const [major, minor, patch] = '${OLD_VERSION}'.split('.').map(Number);
            const bump = '${BUMP_TYPE}';
            if (bump === 'major') console.log(\`\${major+1}.0.0\`);
            else if (bump === 'minor') console.log(\`\${major}.\${minor+1}.0\`);
            else console.log(\`\${major}.\${minor}.\${patch+1}\`);
          ")

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('apps/ptah-electron/package.json', 'utf8'));
            pkg.version = '${NEW_VERSION}';
            fs.writeFileSync('apps/ptah-electron/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          echo "old_version=$OLD_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=electron-v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped $OLD_VERSION -> $NEW_VERSION ($BUMP_TYPE)"

      - name: Check if tag exists
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.bump.outputs.tag }}" | grep -q .; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "::error::Tag ${{ steps.bump.outputs.tag }} already exists."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Abort if tag exists
        if: steps.check.outputs.should_release != 'true'
        run: exit 1

      - name: Commit version bump
        run: |
          git add apps/ptah-electron/package.json
          git commit --no-verify -m "chore(release): electron v${{ steps.bump.outputs.new_version }}"
          git push origin HEAD

  build:
    needs: prepare
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build-args: --win
          - os: macos-latest
            build-args: --mac
          - os: ubuntu-latest
            build-args: --linux

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app
        run: npx nx build ptah-electron

      - name: Copy renderer
        run: npx nx copy-renderer ptah-electron

      - name: Package for platform
        run: npx electron-builder --config electron-builder.yml --project dist/apps/ptah-electron ${{ matrix.build-args }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.os }}
          path: release/
          retention-days: 30

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.prepare.outputs.tag }}" -m "Electron Desktop App v${{ needs.prepare.outputs.version }}"
          git push origin "${{ needs.prepare.outputs.tag }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Ptah Desktop v${{ needs.prepare.outputs.version }}
          draft: false
          generate_release_notes: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/latest*.yml
