# Publish Electron App
#
# Cross-platform Electron builds for Windows, macOS, and Linux.
#
# Workflow:
#   1. Push to release/electron branch (bump version in apps/ptah-electron/package.json first)
#   2. CI reads version, checks if tag already exists (prevents duplicate releases)
#   3. Builds for all 3 platforms in parallel
#   4. Creates git tag + public GitHub Release with all installers
#
# Manual dispatch also supported for re-running builds.
#
# Phase 1: Unsigned builds — no code signing secrets configured.
# Users will see platform warnings ("unidentified developer") until
# code signing is added in a future phase.

name: Publish Electron

on:
  push:
    branches:
      - 'release/electron'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./apps/ptah-electron/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=electron-v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Electron version: $VERSION (tag: electron-v$VERSION)"

      - name: Check if tag exists
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/electron-v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Tag electron-v${{ steps.version.outputs.version }} already exists. Bump the version in apps/ptah-electron/package.json to create a new release."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build-args: --win
          - os: macos-latest
            build-args: --mac
          - os: ubuntu-latest
            build-args: --linux

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set version in build output
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ needs.prepare.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build Electron app
        run: npx nx build ptah-electron

      - name: Copy renderer
        run: npx nx copy-renderer ptah-electron

      - name: Copy assets
        run: npx nx copy-assets ptah-electron

      - name: Package for platform
        run: npx electron-builder --config apps/ptah-electron/electron-builder.yml --project dist/apps/ptah-electron ${{ matrix.build-args }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.os }}
          path: release/
          retention-days: 30

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.prepare.outputs.tag }}" -m "Electron Desktop App v${{ needs.prepare.outputs.version }}"
          git push origin "${{ needs.prepare.outputs.tag }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Ptah Desktop v${{ needs.prepare.outputs.version }}
          draft: false
          generate_release_notes: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/latest*.yml
